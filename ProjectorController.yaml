esphome:
  name: projectorcontroller
  platform: ESP32
  board: nodemcu-32s
  includes:
    - optoma_projector_sensor.h

wifi:
  ssid: 'tomato'
  password: 'bobthebuildertomato'
  ap:
    ssid: 'projectorcontroller'
captive_portal:

logger:
api:
  password: 'Bobthebuilder6'
ota:
  password: 'Bobthebuilder6'

uart:
  id: uart_bus
  tx_pin: GPIO12
  rx_pin: GPIO14
  baud_rate: 9600

switch:
  - platform: uart
    name: "Projector On"
    data: [0x7E, 0x30, 0x30, 0x30, 0x30, 0x20, 0x31, 0x0D]
    id: projon
  - platform: uart
    name: "Projector Off"
    data: [0x7E, 0x30, 0x30, 0x30, 0x30, 0x20, 0x30, 0x0D]
    id: projoff

esp32_touch:
  setup_mode: False

binary_sensor:
  - platform: esp32_touch
    name: "Touch On"
    pin: GPIO15
    threshold: 200
    on_press:
      then:
        switch.toggle: projon
      
  - platform: esp32_touch
    name: "Touch Off"
    pin: GPIO33
    threshold: 200
    on_press:
      then:
        switch.toggle: projoff

  - platform: esp32_touch
    name: "Touch Movie Mode"
    pin: GPIO4
    threshold: 200
    on_press:
      then:
        - homeassistant.service:
            service: input_boolean.toggle
            data:
              entity_id: input_boolean.movie_mode
  - platform: custom
    lambda: |-
      auto projector_state = new OptomaProjectorSensor(id(uart_bus));
      App.register_component(projector_state);
      return {projector_state->power_sensor};
    binary_sensors:
      name: "Projector State"