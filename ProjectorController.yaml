esphome:
  name: projectorcontroller
  platform: ESP32
  board: nodemcu-32s
  includes:
    - optoma_projector_sensor.h

wifi:
  ssid: 'tomato'
  password: 'bobthebuildertomato'
  ap:
    ssid: 'projectorcontroller'
captive_portal:

logger:
api:
  password: 'Bobthebuilder6'
ota:
  password: 'Bobthebuilder6'

uart:
  id: uart_bus
  tx_pin: GPIO12
  rx_pin: GPIO14
  baud_rate: 9600

switch:
  - platform: uart
    internal: TRUE
    data: [0x7E, 0x30, 0x30, 0x30, 0x30, 0x20, 0x31, 0x0D]
    id: projon
  - platform: uart
    internal: TRUE
    data: [0x7E, 0x30, 0x30, 0x30, 0x30, 0x20, 0x30, 0x0D]
    id: projoff
  - platform: template
    name: "Projector"
    id: projswitch
    lambda: |-
      if (id(statepow).state==1) {
        return true;
      } else {
        return false;
      }
    turn_on_action:
      - switch.turn_on: projon
    turn_off_action:
      - switch.turn_on: projoff

esp32_touch:
  setup_mode: False
#  iir_filter: 10ms #Seems to cause instability

binary_sensor:
  - platform: esp32_touch
    name: "Touch Toggle"
    pin: GPIO15
    threshold: 200
    on_press:
      then:
        switch.toggle: projswitch
      
#  - platform: esp32_touch
#    name: "Spare"
#    pin: GPIO33
#    threshold: 200
#    on_press:
#      then:
#        switch.toggle: projoff

  - platform: esp32_touch
    name: "Touch Movie Mode"
    pin: GPIO4
    threshold: 200
    on_press:
      then:
        - homeassistant.service:
            service: input_boolean.toggle
            data:
              entity_id: input_boolean.movie_mode
  
sensor:
  - platform: custom
    lambda: |-
      auto projector_state = new OptomaProjectorSensor(id(uart_bus));
      App.register_component(projector_state);
      return {projector_state->power_sensor, projector_state->lamp_hours, projector_state->av_input, projector_state->feedback, projector_state->status_no};
    sensors:
      - name: "Projector State"
        internal: TRUE
        id: statepow
      - name: "Lamp Hours"
        unit_of_measurement: Hours
        accuracy_decimals: 0
      - name: "Active Input"
      - name: "Feedback"
        internal: TRUE
      - name: "Status Code"
        internal: TRUE
        id: statuscode